<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Vegas Vigilância</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --silver-bright: #ffffff;
      --silver-main: #c0c0c0;
      --silver-dark: #808080;
      --bg-dark: #0a0a0c;
      --glass-bg: rgba(30, 30, 35, 0.8);
      --border-glass: rgba(192, 192, 192, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 50% 50%, #1a1a1f 0%, #0a0a0c 100%),
        linear-gradient(rgba(192, 192, 192, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192, 192, 192, 0.03) 1px, transparent 1px);
      background-size: 100% 100%, 30px 30px, 30px 30px;
      color: #e0e0e0;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 40px 20px 20px;
      text-align: center;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
    }

    header img {
      max-width: 300px;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
    }

    .container {
      max-width: 520px;
      width: 90%;
      margin: 20px auto;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 45px 40px;
      border-radius: 12px;
      border: 1px solid var(--border-glass);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(192, 192, 192, 0.05);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--silver-main), var(--silver-bright), var(--silver-main), transparent);
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--silver-bright);
      text-transform: uppercase;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      text-align: center;
    }

    p {
      font-size: 17px;
      margin-bottom: 35px;
      color: #a0a0a0;
      text-align: center;
    }

    .opcoes {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn-opcao {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 24px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(192, 192, 192, 0.15);
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .btn-opcao:hover {
      background: rgba(192, 192, 192, 0.1);
      border-color: var(--silver-main);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    .btn-opcao .titulo {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--silver-bright);
      text-transform: uppercase;
    }

    .btn-opcao .desc {
      font-size: 14px;
      color: var(--silver-dark);
    }

    .btn-opcao .icone {
      font-size: 30px;
      margin-bottom: 4px;
    }

    footer {
      margin-top: auto;
      padding: 30px;
      text-align: center;
      font-size: 13px;
      color: #666;
      border-top: 1px solid rgba(192, 192, 192, 0.05);
    }

    @media (max-width: 480px) {
      .container { padding: 30px 20px; }
    }
  </style>
</head>

<body>

  <header>
    <img src="./assets/logovegas.jpg" alt="Logo Vegas Vigilância">
  </header>

  <div class="container">
    <h2>Sistema de Feedback</h2>
    <p>Selecione abaixo o tipo de resposta que deseja enviar.</p>

    <div class="opcoes">
      <a class="btn-opcao" href="./escolha.html">
        <span class="icone">🤝</span>
        <span class="titulo">Sou Cliente</span>
        <span class="desc">Avaliar os serviços contratados</span>
      </a>

      <a class="btn-opcao" href="./nps_funcionario.html">
        <span class="icone">👤</span>
        <span class="titulo">Sou Funcionário</span>
        <span class="desc">Pesquisa interna</span>
      </a>
    </div>
  </div>

  <footer>
    <p>VEGAS VIGILÂNCIA • PROTOCOLO DE SEGURANÇA INTEGRADA<br>© 2026 TECNOLOGIA E PROTEÇÃO INDUSTRIAL</p>
  </footer>

</body>

</html>
